<!DOCTYPE html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PyPath AI Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              py: {
                green: '#0df259',     // Primary Action / Success
                secondary: '#8b5cf6', // Secondary Accent (Purple) for AI/Magic
                dark: '#0a0f0b',      // Deepest background
                surface: '#111813',   // Card background
                accent: '#1f2e25',    // Borders/Secondary background
                text: '#f1f5f9',      // Primary text (Lighter for better contrast)
                muted: '#94a3b8',     // Secondary text (Blue-ish grey for readability)
              },
              editor: {
                bg: '#050806',
                sidebar: '#0c120e'
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Fira Code', 'monospace'],
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@monaco-editor/react": "https://esm.sh/@monaco-editor/react@^4.6.0",
    "xterm": "https://esm.sh/xterm@^5.3.0",
    "xterm-addon-fit": "https://esm.sh/xterm-addon-fit@^0.8.0"
  }
}
</script>
</head>
  <body class="bg-py-dark text-py-text font-sans antialiased overflow-hidden selection:bg-py-green/30 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
